name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Silence Next's missing-env warnings; the build doesn't need real values.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        # TS errors are still tolerated at build-time behind
        # next.config.mjs::typescript.ignoreBuildErrors, but surface them in
        # CI so the debt is visible.
        run: npm run typecheck || echo "typecheck reported errors (non-blocking)"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
